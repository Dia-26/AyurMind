version: "3.9"

services:
  # ── Python NLP Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./ayurmind-backend
      dockerfile: Dockerfile
    container_name: ayurmind-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://frontend:3000
      - DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./ayurmind
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8000
    container_name: ayurmind-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: ayurmind-network
